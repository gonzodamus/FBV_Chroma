name: Deploy LED editor to GitHub Pages

# Publishes the static web editor in webapp/ to GitHub Pages.
# Enable once in the repo: Settings → Pages → Build and deployment → Source: GitHub Actions.

on:
  push:
    branches: [main]
    paths:
      - 'webapp/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: webapp
      - id: deployment
        uses: actions/deploy-pages@v4
